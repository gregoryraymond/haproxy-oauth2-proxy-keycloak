global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    timeout connect 5s
    timeout client  60s
    timeout server  60s

frontend fe_edge
    bind *:80

    # Tell upstreams what scheme/host the user originally hit so Keycloak
    # and oauth2-proxy build correct redirect/issuer URLs.
    http-request set-header X-Forwarded-Proto http
    http-request set-header X-Forwarded-Host  %[req.hdr(Host)]
    http-request set-header X-Forwarded-Port  %[dst_port]

    # Routing.
    acl is_keycloak    path_beg /auth
    acl is_oauth_proxy path_beg /oauth

    use_backend be_keycloak    if is_keycloak
    use_backend be_oauth2proxy if is_oauth_proxy
    default_backend be_oauth2proxy

backend be_keycloak
    # Keycloak is started with KC_HTTP_RELATIVE_PATH=/auth, so it already
    # expects the /auth prefix — no path rewrite needed.
    option httpchk GET /auth/health/ready
    http-check expect status 200
    server keycloak keycloak:8080 check inter 10s fall 3 rise 2

backend be_oauth2proxy
    # oauth2-proxy owns /oauth/* (proxy-prefix) and reverse-proxies
    # everything else to its upstream (nginx).
    option httpchk GET /ping
    http-check expect status 200
    server oauth2proxy oauth2-proxy:4180 check inter 10s fall 3 rise 2

services:
  haproxy:
    image: haproxy:2.9-alpine
    container_name: a2p-haproxy
    restart: unless-stopped
    ports:
      - "${HOST_IP:-0.0.0.0}:${HOST_PORT:-80}:80"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    healthcheck:
      # wget /ping is proxied through to oauth2-proxy, so this only passes
      # once both haproxy AND oauth2-proxy are up.
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1/ping"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    depends_on:
      oauth2-proxy:
        condition: service_started
      keycloak:
        condition: service_healthy
      nginx:
        condition: service_started
    networks:
      - a2p

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: a2p-oauth2-proxy
    restart: unless-stopped
    command:
      - --config=/etc/oauth2-proxy/oauth2-proxy.cfg
    environment:
      OAUTH2_PROXY_CLIENT_ID: oauth2-proxy
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET:-oauth2-proxy-secret}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:-0123456789abcdef0123456789abcdef}
      # Public URLs — the user's browser hits these via HAProxy.
      OAUTH2_PROXY_OIDC_ISSUER_URL: http://${HOST_IP:-127.0.0.1}:${HOST_PORT:-80}/auth/realms/proxy
      OAUTH2_PROXY_LOGIN_URL: http://${HOST_IP:-127.0.0.1}:${HOST_PORT:-80}/auth/realms/proxy/protocol/openid-connect/auth
      OAUTH2_PROXY_REDIRECT_URL: http://${HOST_IP:-127.0.0.1}:${HOST_PORT:-80}/oauth/callback
      # Allow post-login redirects back to the public host (oauth2-proxy
      # silently drops `rd=` params for off-host targets — including raw IPs
      # — unless the host is whitelisted).
      OAUTH2_PROXY_WHITELIST_DOMAINS: ${HOST_IP:-127.0.0.1}:${HOST_PORT:-80}
      # Internal URLs (redeem/profile/validate/jwks) live in oauth2-proxy.cfg.
    volumes:
      - ./oauth2-proxy/oauth2-proxy.cfg:/etc/oauth2-proxy/oauth2-proxy.cfg:ro
    # No healthcheck: the official image is distroless (no shell, wget, or nc).
    # HAProxy's healthcheck below proxies /ping to this service, so HAProxy
    # only goes healthy once oauth2-proxy is actually responding.
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - a2p

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: a2p-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: ${HOST_IP:-127.0.0.1}
      KC_HOSTNAME_PORT: ${HOST_PORT:-80}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      # KC_PROXY is deprecated in 24, removed in 26. Use KC_PROXY_HEADERS instead.
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          exec 3<>/dev/tcp/127.0.0.1/8080 &&
          printf 'GET /auth/health/ready HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3 &&
          grep -q '"status": "UP"' <&3
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - a2p

  nginx:
    image: nginx:1.27-alpine
    container_name: a2p-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    networks:
      - a2p

networks:
  a2p:
    driver: bridge

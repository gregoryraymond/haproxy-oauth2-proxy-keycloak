apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oauth2-keycloak.fullname" . }}-nginx
  labels:
    {{- include "oauth2-keycloak.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "oauth2-keycloak.componentSelectorLabels" (dict "ctx" . "component" "nginx") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "oauth2-keycloak.labels" . | nindent 8 }}
        app.kubernetes.io/component: nginx
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/nginx-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "oauth2-keycloak.fullname" . }}-nginx
            items:
              - key: default.conf
                path: default.conf
        - name: html
          configMap:
            name: {{ include "oauth2-keycloak.fullname" . }}-nginx
            items:
              - key: index.html
                path: index.html

apiVersion: v1
kind: Service
metadata:
  name: {{ include "oauth2-keycloak.fullname" . }}-keycloak
  labels:
    {{- include "oauth2-keycloak.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  type: ClusterIP
  selector:
    {{- include "oauth2-keycloak.componentSelectorLabels" (dict "ctx" . "component" "keycloak") | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: http

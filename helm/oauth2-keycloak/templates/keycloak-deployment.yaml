apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oauth2-keycloak.fullname" . }}-keycloak
  labels:
    {{- include "oauth2-keycloak.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "oauth2-keycloak.componentSelectorLabels" (dict "ctx" . "component" "keycloak") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "oauth2-keycloak.labels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak
      annotations:
        # Trigger rollout when the realm changes.
        checksum/realm: {{ include (print $.Template.BasePath "/keycloak-realm-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          args: ["start-dev", "--import-realm"]
          envFrom:
            - secretRef:
                name: {{ include "oauth2-keycloak.fullname" . }}-keycloak
          env:
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HTTP_RELATIVE_PATH
              value: /auth
            - name: KC_HOSTNAME
              value: {{ .Values.host | quote }}
            {{- if .Values.port }}
            - name: KC_HOSTNAME_PORT
              value: {{ .Values.port | quote }}
            {{- end }}
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HEALTH_ENABLED
              value: "true"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /auth/health/ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /auth/health/live
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
              readOnly: true
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
      volumes:
        - name: realm
          configMap:
            name: {{ include "oauth2-keycloak.fullname" . }}-keycloak-realm

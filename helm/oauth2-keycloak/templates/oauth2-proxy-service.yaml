apiVersion: v1
kind: Service
metadata:
  name: {{ include "oauth2-keycloak.fullname" . }}-oauth2-proxy
  labels:
    {{- include "oauth2-keycloak.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
spec:
  type: ClusterIP
  selector:
    {{- include "oauth2-keycloak.componentSelectorLabels" (dict "ctx" . "component" "oauth2-proxy") | nindent 4 }}
  ports:
    - name: http
      port: 4180
      targetPort: http

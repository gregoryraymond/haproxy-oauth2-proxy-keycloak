apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "oauth2-keycloak.fullname" . }}-nginx
  labels:
    {{- include "oauth2-keycloak.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
data:
  default.conf: |
    server {
        listen      80 default_server;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        location = / {
            try_files /index.html =404;
        }

        location = /page {
            default_type text/html;
            return 200 '<!doctype html>
    <html>
    <head><meta charset="utf-8"><title>Protected page</title>
    <style>body{font-family:system-ui;max-width:40rem;margin:3rem auto;padding:0 1rem}
    code{background:#f3f3f3;padding:0.1rem 0.3rem;border-radius:3px}
    dl{display:grid;grid-template-columns:auto 1fr;gap:0.3rem 1rem}
    dt{font-weight:600}</style></head>
    <body>
    <h1>You are signed in</h1>
    <dl>
      <dt>User</dt>             <dd><code>$http_x_forwarded_user</code></dd>
      <dt>Email</dt>            <dd><code>$http_x_forwarded_email</code></dd>
      <dt>PreferredUsername</dt><dd><code>$http_x_forwarded_preferred_username</code></dd>
      <dt>Groups</dt>           <dd><code>$http_x_forwarded_groups</code></dd>
    </dl>
    <p><a href="/">home</a> &middot; <a href="/oauth/sign_out">sign out</a></p>
    </body></html>';
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
        <meta charset="utf-8">
        <title>auth2-proxy demo</title>
        <style>
            body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 3rem auto; padding: 0 1rem; color: #222; }
            h1 { margin-bottom: 0.2rem; }
            .sub { color: #666; margin-top: 0; }
            ul { line-height: 1.7; }
            code { background: #f3f3f3; padding: 0.1rem 0.3rem; border-radius: 3px; }
        </style>
    </head>
    <body>
        <h1>auth2-proxy</h1>
        <p class="sub">HAProxy + oauth2-proxy + Keycloak demo</p>

        <p>You reached this page because oauth2-proxy verified your Keycloak session.</p>

        <ul>
            <li><a href="/page">/page</a> — same auth, shows your identity headers</li>
            <li><a href="/auth/admin/">/auth/admin/</a> — Keycloak admin console</li>
            <li><a href="/oauth/sign_out">/oauth/sign_out</a> — clear oauth2-proxy session</li>
        </ul>
    </body>
    </html>

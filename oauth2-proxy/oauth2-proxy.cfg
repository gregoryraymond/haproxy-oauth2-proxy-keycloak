# oauth2-proxy config. Most secrets/URLs are injected via env vars
# (see docker-compose.yml: OAUTH2_PROXY_*).

http_address = "0.0.0.0:4180"
reverse_proxy = true

# Path prefix for oauth2-proxy's own endpoints. Public URLs become:
#   /oauth/start, /oauth/callback, /oauth/sign_in, /oauth/sign_out, /oauth/auth
proxy_prefix = "/oauth"

# Reverse-proxy authenticated traffic to nginx.
upstreams = ["http://nginx:80/"]

# Keycloak via OIDC.
provider = "keycloak-oidc"
# OIDC scopes — "openid" is required; profile/email populate user headers.
scope = "openid email profile"

# We bypass OIDC discovery so we can split the URLs:
#   * Public URLs (login, issuer, redirect) — what the user's browser hits via HAProxy.
#   * Internal URLs (token, userinfo, jwks) — what oauth2-proxy hits over the docker
#     network, avoiding hairpin-NAT issues on Docker Desktop.
# Keycloak still issues tokens with `iss = <public URL>` because of KC_HOSTNAME,
# so JWT validation against oidc_issuer_url succeeds without any network call.
skip_oidc_discovery = true
redeem_url    = "http://keycloak:8080/auth/realms/proxy/protocol/openid-connect/token"
profile_url   = "http://keycloak:8080/auth/realms/proxy/protocol/openid-connect/userinfo"
validate_url  = "http://keycloak:8080/auth/realms/proxy/protocol/openid-connect/userinfo"
oidc_jwks_url = "http://keycloak:8080/auth/realms/proxy/protocol/openid-connect/certs"

# Skip the oauth2-proxy "Sign in with Keycloak" splash; jump straight to Keycloak.
skip_provider_button = true

# Allow any email — gate access in Keycloak (users/roles) instead.
email_domains = ["*"]

# Pass identity to the upstream so nginx (or any app) can render it.
pass_user_headers = true
set_xauthrequest = true
pass_access_token = false

# Cookies — plain HTTP for the local demo. Flip cookie_secure=true behind TLS.
cookie_secure = false
cookie_httponly = true
cookie_samesite = "lax"
cookie_expire = "168h"
cookie_refresh = "60m"

# Trust the X-Forwarded-* headers HAProxy sets.
real_client_ip_header = "X-Forwarded-For"

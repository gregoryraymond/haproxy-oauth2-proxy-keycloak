server {
    listen      80 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Default landing — only reachable after oauth2-proxy authenticates.
    location = / {
        try_files /index.html =404;
    }

    # A second protected page that shows the user identity oauth2-proxy
    # injects via X-Forwarded-* request headers (pass_user_headers=true).
    location = /page {
        default_type text/html;
        return 200 '<!doctype html>
<html>
<head><meta charset="utf-8"><title>Protected page</title>
<style>body{font-family:system-ui;max-width:40rem;margin:3rem auto;padding:0 1rem}
code{background:#f3f3f3;padding:0.1rem 0.3rem;border-radius:3px}
dl{display:grid;grid-template-columns:auto 1fr;gap:0.3rem 1rem}
dt{font-weight:600}</style></head>
<body>
<h1>You are signed in</h1>
<dl>
  <dt>User</dt>             <dd><code>$http_x_forwarded_user</code></dd>
  <dt>Email</dt>            <dd><code>$http_x_forwarded_email</code></dd>
  <dt>PreferredUsername</dt><dd><code>$http_x_forwarded_preferred_username</code></dd>
  <dt>Groups</dt>           <dd><code>$http_x_forwarded_groups</code></dd>
</dl>
<p><a href="/">home</a> &middot; <a href="/oauth/sign_out">sign out</a></p>
</body></html>';
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

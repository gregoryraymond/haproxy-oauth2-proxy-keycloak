server {
    listen      80 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Default landing — only reachable after oauth2-proxy authenticates.
    location = / {
        try_files /index.html =404;
    }

    # A second protected page to show off the X-Auth-Request-* headers
    # that oauth2-proxy injects.
    location = /page {
        default_type text/html;
        return 200 '<!doctype html>
<html>
<head><meta charset="utf-8"><title>Protected page</title>
<style>body{font-family:system-ui;max-width:40rem;margin:3rem auto;padding:0 1rem}
code{background:#f3f3f3;padding:0.1rem 0.3rem;border-radius:3px}</style></head>
<body>
<h1>You are signed in</h1>
<p>Hello <strong>$http_x_auth_request_preferred_username</strong>
   &lt;$http_x_auth_request_email&gt;.</p>
<p><a href="/">home</a> &middot; <a href="/oauth/sign_out">sign out</a></p>
</body></html>';
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
